<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#1B4332"/>

  <!-- Scales of justice -->
  <!-- Center pillar -->
  <rect x="97" y="52" width="6" height="80" rx="3" fill="#D4A427"/>

  <!-- Top bar -->
  <rect x="58" y="52" width="84" height="6" rx="3" fill="#D4A427"/>

  <!-- Left pan chain -->
  <line x1="70" y1="58" x2="63" y2="82" stroke="#D4A427" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="58" x2="77" y2="82" stroke="#D4A427" stroke-width="3" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M58 82 Q70 95 82 82" stroke="#D4A427" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Right pan chain -->
  <line x1="130" y1="58" x2="123" y2="88" stroke="#D4A427" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="58" x2="137" y2="88" stroke="#D4A427" stroke-width="3" stroke-linecap="round"/>
  <!-- Right pan (slightly lower = unbalanced / in use) -->
  <path d="M118 88 Q130 101 142 88" stroke="#D4A427" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Base -->
  <rect x="82" y="130" width="36" height="5" rx="2.5" fill="#D4A427"/>
  <rect x="76" y="133" width="48" height="5" rx="2.5" fill="#D4A427"/>

  <!-- Stars (3 small, bottom arc) -->
  <circle cx="86"  cy="158" r="3" fill="#D4A427" opacity="0.7"/>
  <circle cx="100" cy="162" r="3" fill="#D4A427"/>
  <circle cx="114" cy="158" r="3" fill="#D4A427" opacity="0.7"/>
</svg>
